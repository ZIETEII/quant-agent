name: Construir y Subir Imagen Docker

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Compilar y Subir Imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/zieteii/quant-agent:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Desplegar en Portainer automáticamente
        env:
          PORTAINER_WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK" ]; then
            echo "Aviso: No se configuró el secreto PORTAINER_WEBHOOK en Github. Saltando despliegue automático..."
          else
            echo "Notificando a Portainer para hacer el Pull & Redeploy..."
            curl -X POST "$PORTAINER_WEBHOOK"
            echo -e "\n¡Actualización enviada a Portainer!"
          fi
