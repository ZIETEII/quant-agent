version: '3.8'

services:
  quant_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant_agent_v1
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PAPER_MODE=False  # ¡ADVERTENCIA: False significa LIVE TRADING con capital real!
      # Conexión directa a la base de datos Postgres del stack de Supabase (ORION)
      - DATABASE_URL=postgresql://postgres:011436cf3c97901c7be1be84e5499eca@db:5432/postgres
    networks:
      - logvoxNet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  logvoxNet:
    external: true
    name: logvoxNet
