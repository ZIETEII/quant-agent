version: '3.8'

services:
  quant_agent:
    image: ghcr.io/zieteii/quant-agent:latest
    deploy:
      restart_policy:
        condition: any
      labels:
        - traefik.enable=true
        - traefik.http.routers.quant_agent.rule=Host(`quant.logvox.com`)
        - traefik.http.services.quant_agent.loadbalancer.server.port=8000
        - traefik.http.routers.quant_agent.service=quant_agent
        - traefik.http.routers.quant_agent.entrypoints=websecure
        - traefik.http.routers.quant_agent.tls.certresolver=letsencryptresolver
        - traefik.http.routers.quant_agent.tls=true


    environment:
      # ── Trading Mode ──
      - PAPER_TRADING_MODE=True           # ✅ Simulación con precios reales / sin txs
      - SOLANA_RPC_URL=https://api.mainnet-beta.solana.com
      # ── Telegram ──
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # ── Solana / Jupiter ──
      - SOLANA_WALLET_ADDRESS=${SOLANA_WALLET_ADDRESS}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}
      - JUPITER_API_KEY=${JUPITER_API_KEY}
      # ── Trading Config ──
      - MAX_OPEN_TRADES=${MAX_OPEN_TRADES:-15}
      - SCAN_INTERVAL_SECONDS=${SCAN_INTERVAL_SECONDS:-15}
      - BLUECHIP_SLOTS=${BLUECHIP_SLOTS:-5}
      - SNIPER_SLOTS=${SNIPER_SLOTS:-10}
      # ── Bluechip ──
      - BC_MIN_SCORE=${BC_MIN_SCORE:-35}
      - BC_TAKE_PROFIT=${BC_TAKE_PROFIT:-8}
      - BC_STOP_LOSS=${BC_STOP_LOSS:-5}
      - BC_TRAILING=${BC_TRAILING:-3}
      - BC_RISK_PCT=${BC_RISK_PCT:-0.12}
      - BC_SLIPPAGE=${BC_SLIPPAGE:-100}
      - BC_DEAD_MINUTES=${BC_DEAD_MINUTES:-5}
      # ── Sniper ──
      - SN_MIN_MOMENTUM=${SN_MIN_MOMENTUM:-10}
      - SN_MIN_SAFETY=${SN_MIN_SAFETY:-10}
      - SN_MIN_SCORE=${SN_MIN_SCORE:-20}
      - SN_TAKE_PROFIT=${SN_TAKE_PROFIT:-25}
      - SN_STOP_LOSS=${SN_STOP_LOSS:-12}
      - SN_TRAILING=${SN_TRAILING:-8}
      - SN_RISK_PCT=${SN_RISK_PCT:-0.08}
      - SN_SLIPPAGE_BUY=${SN_SLIPPAGE_BUY:-1500}
      - SN_SLIPPAGE_SELL=${SN_SLIPPAGE_SELL:-2000}
      - SN_MOONBAG=${SN_MOONBAG:-0.20}
      - SN_DEAD_MINUTES=${SN_DEAD_MINUTES:-5}
      - SNIPER_MAX_AGE_MIN=${SNIPER_MAX_AGE_MIN:-60}
      # ── Supabase VPS (logvoxNet interno) ──
      - SUPABASE_URL=${SUPABASE_URL:-http://kong:8000}
      - SUPABASE_PUBLIC_URL=${SUPABASE_PUBLIC_URL:-https://xxsupabase.logvox.com}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - logvoxNet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  logvoxNet:
    external: true
    name: logvoxNet
